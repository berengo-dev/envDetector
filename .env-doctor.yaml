version: "1"

# Required binaries and their expected versions.
# Supports exact ("1.21.5"), prefix ("1.21"), and wildcard ("24.x") matching.
tools:
  go: "1.21"
  node: "20.x"
  docker: "24.x"

# Required environment variables.
env:
  - DATABASE_URL
  - REDIS_URL

# Required files.
files:
  - .env
  - config.json

# Ports that should be free or occupied.
ports:
  3000: occupied
  5432: free
